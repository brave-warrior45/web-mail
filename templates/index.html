<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Temp Mail</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background: #1e1e2e; color: #cdd6f4; }
        .container { max-width: 800px; margin: auto; background: #181825; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: #b4befe; }
        
        .input-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; outline: none; }
        .email-input { width: 60%; font-weight: bold; text-align: center; }
        .pass-input { width: 30%; text-align: center; font-size: 14px; }
        
        button { padding: 10px 15px; font-size: 14px; cursor: pointer; font-weight: bold; background: #89b4fa; color: #11111b; border: none; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #74c7ec; }
        .danger-btn { background: #f38ba8; color: #11111b; }
        .danger-btn:hover { background: #eba0ac; }
        
        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .section-box { background: #313244; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; }
        
        .saved-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .saved-item { display: flex; justify-content: space-between; align-items: center; background: #45475a; padding: 10px; border-radius: 5px; cursor: pointer; }
        .saved-item:hover { background: #585b70; }
        
        .message { border-left: 4px solid #89b4fa; background: #1e1e2e; padding: 15px; margin-top: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .message:hover { background: #45475a; }
        #message-content { margin-top: 20px; padding: 20px; background: #cdd6f4; color: #11111b; border-radius: 8px; display: none; overflow-x: auto; }
        
        #admin-login-container { max-width: 400px; margin: 100px auto; background: #181825; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #admin-login-container input { width: 90%; margin-bottom: 15px; text-align: left; }
        #admin-login-container button { width: 97%; padding: 12px; font-size: 16px; margin-top: 10px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #181825; padding: 25px; border-radius: 10px; width: 350px; text-align: center; border: 1px solid #45475a; }
        .modal-buttons { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div id="admin-login-container" style="display: none;">
        <h2>Admin Login</h2>
        <input type="text" id="admin-uname" placeholder="Username">
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <p id="login-error" style="color: #f38ba8; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <div class="container" id="app-container" style="display: none;">
        <h1>Private TempMail</h1>
        <p>Active Database Connection: Secure</p>
        
        <div class="input-group">
            <input type="text" id="email-address" class="email-input" readonly placeholder="Connecting...">
            <button id="copy-mail-btn" onclick="copyData('email-address', 'copy-mail-btn')">Copy Mail</button>
        </div>
        <div class="input-group">
            <input type="text" id="email-password" class="pass-input" readonly placeholder="Password...">
            <button id="copy-pass-btn" onclick="copyData('email-password', 'copy-pass-btn')">Copy Pass</button>
        </div>
        
        <div class="controls">
            <button onclick="fetchEmails()">🔄 Refresh Inbox</button>
            <button onclick="promptNewEmail()">➕ Get New Email</button>
            <button class="danger-btn" onclick="adminLogout()">🚪 Logout</button>
        </div>

        <div class="section-box">
            <h3>MongoDB Saved Inboxes</h3>
            <div class="saved-list" id="saved-list">
                Loading database...
            </div>
        </div>

        <div class="section-box">
            <h3>Inbox <span style="font-size: 12px; color: #a6adc8;">(Auto-refreshes every 10s)</span></h3>
            <div id="messages-list">Waiting for connection...</div>
        </div>

        <div id="message-content" style="text-align: left;"></div>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal">
            <h3>Action Required</h3>
            <p>Do you want to save the current email to MongoDB before generating a new one?</p>
            <div class="modal-buttons">
                <button onclick="confirmNewEmail('save')">Save to DB & Get New</button>
                <button class="danger-btn" onclick="confirmNewEmail('discard')">Discard Current & Get New</button>
                <button style="background: #45475a; color: white;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";
        let currentPassword = "";
        let currentToken = "";
        let refreshInterval;

        // Initialize: Check if logged in
        window.onload = async () => {
            const res = await fetch('/api/auth/status', { cache: 'no-store' });
            const data = await res.json();
            if (data.logged_in) {
                initApp();
            } else {
                document.getElementById('admin-login-container').style.display = 'block';
            }
        };

        // --- Auth Functions ---

        async function adminLogin() {
            const uname = document.getElementById('admin-uname').value;
            const pass = document.getElementById('admin-pass').value;
            const err = document.getElementById('login-error');
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: uname, password: pass})
            });
            const data = await res.json();
            
            if (data.success) {
                err.innerText = "";
                document.getElementById('admin-login-container').style.display = 'none';
                initApp();
            } else {
                err.innerText = data.error;
            }
        }

        async function adminLogout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.reload();
        }

        // --- Main App Logic ---

        async function initApp() {
            document.getElementById('app-container').style.display = 'block';
            await renderSavedAccounts();
            
            // Try to load the first saved account from the DB, otherwise generate new
            const res = await fetch('/api/db/accounts', { cache: 'no-store' });
            const saved = await res.json();
            if (saved && saved.length > 0) {
                setSessionData(saved[0].email, saved[0].password, saved[0].token);
            } else {
                generateNewEmail();
            }
        }

        function setSessionData(email, password, token) {
            currentEmail = email;
            currentPassword = password;
            currentToken = token;
            
            document.getElementById('email-address').value = email;
            document.getElementById('email-password').value = password;
            document.getElementById('messages-list').innerHTML = "Checking inbox...";
            document.getElementById('message-content').style.display = "none";
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchEmails, 10000); 
            fetchEmails();
        }

        // --- Database & API Functions ---

        async function generateNewEmail() {
            document.getElementById('email-address').value = "Generating secure email...";
            document.getElementById('email-password').value = "";
            try {
                // Prevent caching the new email generation
                const response = await fetch('/api/generate', { cache: 'no-store' });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                setSessionData(data.email, data.password, data.token);
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        async function fetchEmails() {
            if (!currentToken) return;
            // Bypass cache to ensure we see new emails instantly
            const response = await fetch(`/api/messages?token=${currentToken}`, { cache: 'no-store' });
            const messages = await response.json();
            if (messages.error) return;

            const list = document.getElementById('messages-list');
            if (messages.length === 0) {
                list.innerHTML = "No new messages. Waiting for OTP...";
                return;
            }
            list.innerHTML = "";
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `<strong>From:</strong> ${msg.from} <br> <strong>Subject:</strong> ${msg.subject}`;
                div.onclick = () => readMessage(msg.id);
                list.appendChild(div);
            });
        }

        async function readMessage(id) {
            const response = await fetch(`/api/read?token=${currentToken}&id=${id}`, { cache: 'no-store' });
            const msg = await response.json();
            if (msg.error) return;

            const contentDiv = document.getElementById('message-content');
            contentDiv.style.display = "block";
            const bodyContent = msg.htmlBody ? msg.htmlBody : `<pre>${msg.textBody}</pre>`;
            contentDiv.innerHTML = `<h4>${msg.subject}</h4><p><b>From:</b> ${msg.from}</p><hr>${bodyContent}`;
        }

        // --- MongoDB Sync Functions ---

        async function saveCurrentAccount() {
            if(!currentEmail) return;
            await fetch('/api/db/accounts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: currentEmail, password: currentPassword, token: currentToken})
            });
            await renderSavedAccounts();
        }

        async function renderSavedAccounts() {
            const list = document.getElementById('saved-list');
            // Force browser to bypass cache and fetch the latest DB data
            const res = await fetch('/api/db/accounts', { cache: 'no-store' });
            const saved = await res.json();
            
            if (saved.length === 0) {
                list.innerHTML = "<p style='color:#a6adc8; font-size:14px;'>No accounts in Database.</p>";
                return;
            }

            list.innerHTML = "";
            saved.forEach((acc) => {
                const item = document.createElement('div');
                item.className = 'saved-item';
                
                const txt = document.createElement('span');
                txt.innerText = acc.email;
                txt.onclick = () => setSessionData(acc.email, acc.password, acc.token);
                
                const delBtn = document.createElement('button');
                delBtn.className = 'danger-btn';
                delBtn.innerText = 'X';
                delBtn.style.padding = '5px 10px';
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await fetch('/api/db/accounts', {
                        method: 'DELETE',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({email: acc.email})
                    });
                    renderSavedAccounts();
                };

                item.appendChild(txt);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        // --- UI & Modal Logic ---

        function copyData(inputId, btnId) {
            const input = document.getElementById(inputId);
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 2000);
        }

        function promptNewEmail() { document.getElementById('custom-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
        
        async function confirmNewEmail(action) {
            if (action === 'save') {
                await saveCurrentAccount(); 
            }
            closeModal();
            generateNewEmail();
        }
    </script>
</body>
</html>
