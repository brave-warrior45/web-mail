<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp OTP & Mail</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #2c2f33; color: white; }
        .container { max-width: 600px; margin: auto; background: #23272a; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input { padding: 15px; width: 75%; font-size: 18px; text-align: center; margin-bottom: 20px; border-radius: 5px; border: none; background: #eeeeee; color: #333; font-weight: bold;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #7289da; color: white; border: none; border-radius: 5px; margin: 5px; transition: 0.2s;}
        button:hover { background: #5b6eae; }
        .remove-btn { background: #ed4245; }
        .remove-btn:hover { background: #c03537; }
        .inbox { margin-top: 30px; text-align: left; background: #2c2f33; padding: 15px; border-radius: 5px;}
        .message { border-bottom: 1px solid #444; padding: 15px 0; cursor: pointer; transition: 0.2s;}
        .message:hover { background: #3a3e45; padding-left: 10px;}
        #message-content { margin-top: 20px; padding: 20px; background: #ffffff; color: #000; border-radius: 5px; display: none; text-align: left; overflow-x: auto;}
    </style>
</head>
<body>
    <div class="container">
        <h1>TempMail OTP</h1>
        <p>Your temporary, always-available email address:</p>
        
        <div>
            <input type="text" id="email-address" readonly placeholder="Generating secure email...">
        </div>
        
        <button onclick="fetchEmails()">Refresh Inbox</button>
        <button class="remove-btn" onclick="generateEmail()">Remove & Get New</button>

        <div class="inbox" id="inbox">
            <h3>Inbox <span style="font-size: 12px; color: #aaa;">(Auto-refreshes every 10s)</span></h3>
            <div id="messages-list">Waiting for incoming emails...</div>
        </div>

        <div id="message-content"></div>
    </div>

    <script>
        let currentEmail = "";
        let currentToken = "";
        let refreshInterval;

        // Automatically fetches a new account token via our Python backend
        async function generateEmail() {
            document.getElementById('email-address').value = "Connecting to mail server...";
            document.getElementById('messages-list').innerHTML = "Waiting for incoming emails...";
            document.getElementById('message-content').style.display = "none";

            try {
                const response = await fetch('/api/generate');
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                currentEmail = data.email;
                currentToken = data.token;
                document.getElementById('email-address').value = currentEmail;

                // Start checking inbox every 10 seconds
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(fetchEmails, 10000); 
                fetchEmails();
            } catch (error) {
                console.error("Generation Error:", error);
                document.getElementById('email-address').value = "Error generating email. Try again.";
            }
        }

        async function fetchEmails() {
            if (!currentToken) return;
            try {
                const response = await fetch(`/api/messages?token=${currentToken}`);
                const messages = await response.json();
                
                if (messages.error) throw new Error(messages.error);

                const list = document.getElementById('messages-list');
                if (messages.length === 0) {
                    list.innerHTML = "No new messages. Waiting for OTP...";
                    return;
                }

                list.innerHTML = "";
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message';
                    div.innerHTML = `<strong>From:</strong> ${msg.from} <br> <strong>Subject:</strong> ${msg.subject}`;
                    div.onclick = () => readMessage(msg.id);
                    list.appendChild(div);
                });
            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }

        async function readMessage(id) {
            try {
                const response = await fetch(`/api/read?token=${currentToken}&id=${id}`);
                const msg = await response.json();
                
                if (msg.error) throw new Error(msg.error);

                const contentDiv = document.getElementById('message-content');
                contentDiv.style.display = "block";
                
                // Format the timestamp nicely
                const dateObj = new Date(msg.date);
                const timeString = dateObj.toLocaleString();

                const bodyContent = msg.htmlBody ? msg.htmlBody : `<pre>${msg.textBody}</pre>`;
                contentDiv.innerHTML = `<h4>${msg.subject}</h4><p><b>From:</b> ${msg.from}</p><p><b>Received:</b> ${timeString}</p><hr>${bodyContent}`;
            } catch (error) {
                console.error("Read Error:", error);
            }
        }

        // Initialize on page load
        generateEmail();
    </script>
</body>
</html>
